<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>

    <!-- BG radial gradient - warm deep teal -->
    <radialGradient id="bgRad" cx="45%" cy="38%" r="70%">
      <stop offset="0%" style="stop-color:#0a4f6e"/>
      <stop offset="60%" style="stop-color:#063650"/>
      <stop offset="100%" style="stop-color:#031f30"/>
    </radialGradient>

    <!-- Skin tone gradient -->
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4c08a"/>
      <stop offset="100%" style="stop-color:#e09050"/>
    </linearGradient>

    <!-- Suit blue -->
    <linearGradient id="suit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#0d3c7a"/>
    </linearGradient>

    <!-- Suit teal (female) -->
    <linearGradient id="suitTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00838f"/>
      <stop offset="100%" style="stop-color:#005662"/>
    </linearGradient>

    <!-- Center glowing ring -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#29b6f6"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>

    <!-- Gold -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#f4a800"/>
    </linearGradient>

    <!-- Gear gradient -->
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>

    <!-- Leaf/growth gradient -->
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Light shadow -->
    <filter id="shadowLight">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>

  </defs>

  <!-- ========== DARK BG CIRCLE ========== -->
  <circle cx="140" cy="140" r="136" fill="url(#bgRad)"/>

  <!-- Outer border ring -->
  <circle cx="140" cy="140" r="133" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="140" cy="140" r="128" fill="none" stroke="#29b6f6" stroke-width="0.6" stroke-opacity="0.2" stroke-dasharray="5 6"/>

  <!-- ========== BACKGROUND DECORATIVE RINGS ========== -->
  <circle cx="140" cy="140" r="96" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.12" stroke-dasharray="3 7"/>
  <circle cx="140" cy="140" r="72" fill="none" stroke="#29b6f6" stroke-width="0.6" stroke-opacity="0.1"/>

  <!-- Subtle grid lines -->
  <line x1="10" y1="140" x2="270" y2="140" stroke="#00e5ff" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="140" y1="10" x2="140" y2="270" stroke="#00e5ff" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Diagonal light rays -->
  <line x1="140" y1="140" x2="30" y2="30" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.06"/>
  <line x1="140" y1="140" x2="250" y2="30" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.06"/>
  <line x1="140" y1="140" x2="30" y2="250" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.06"/>
  <line x1="140" y1="140" x2="250" y2="250" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- ========== ORBITING DOTS (network constellation) ========== -->
  <!-- Orbit ring -->
  <circle cx="140" cy="140" r="108" fill="none" stroke="url(#ringGrad)" stroke-width="1.2" stroke-opacity="0.25"/>

  <!-- Orbit nodes -->
  <circle cx="140" cy="32" r="5" fill="#00e5ff" fill-opacity="0.9" filter="url(#glow)"/>
  <circle cx="227" cy="75" r="4" fill="#29b6f6" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="248" cy="172" r="4" fill="#29b6f6" fill-opacity="0.7" filter="url(#glow)"/>
  <circle cx="190" cy="237" r="3.5" fill="#00e5ff" fill-opacity="0.6" filter="url(#glow)"/>
  <circle cx="90" cy="237" r="3.5" fill="#00e5ff" fill-opacity="0.6" filter="url(#glow)"/>
  <circle cx="32" cy="172" r="4" fill="#29b6f6" fill-opacity="0.7" filter="url(#glow)"/>
  <circle cx="53" cy="75" r="4" fill="#29b6f6" fill-opacity="0.8" filter="url(#glow)"/>

  <!-- Lines connecting orbit nodes to center cluster -->
  <line x1="140" y1="32" x2="140" y2="80" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="227" y1="75" x2="190" y2="105" stroke="#29b6f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="248" y1="172" x2="200" y2="155" stroke="#29b6f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="53" y1="75" x2="90" y2="105" stroke="#29b6f6" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="32" y1="172" x2="80" y2="155" stroke="#29b6f6" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- ========== GEAR / COG (process symbol, bottom left) ========== -->
  <g transform="translate(65,188)" filter="url(#shadowLight)">
    <g fill="url(#gearGrad)" fill-opacity="0.9">
      <!-- Gear teeth -->
      <rect x="-4" y="-22" width="8" height="8" rx="1.5"/>
      <rect x="-4" y="14" width="8" height="8" rx="1.5"/>
      <rect x="14" y="-4" width="8" height="8" rx="1.5"/>
      <rect x="-22" y="-4" width="8" height="8" rx="1.5"/>
      <rect x="10" y="-18" width="8" height="8" rx="1.5" transform="rotate(45,14,-14)"/>
      <rect x="-18" y="10" width="8" height="8" rx="1.5" transform="rotate(45,-14,14)"/>
      <rect x="10" y="10" width="8" height="8" rx="1.5" transform="rotate(-45,14,14)"/>
      <rect x="-18" y="-18" width="8" height="8" rx="1.5" transform="rotate(-45,-14,-14)"/>
      <!-- Main circle -->
      <circle cx="0" cy="0" r="14"/>
    </g>
    <!-- Inner hole -->
    <circle cx="0" cy="0" r="6" fill="#063650"/>
  </g>

  <!-- ========== LEAF / GROWTH SYMBOL (bottom right) ========== -->
  <g transform="translate(208,195)" filter="url(#shadowLight)">
    <path d="M0,18 C0,18 -18,-5 -5,-18 C8,-31 20,-18 18,0 C16,14 0,18 0,18 Z" fill="url(#green)" fill-opacity="0.9"/>
    <path d="M0,18 C0,18 -2,-5 0,-18" fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.4" stroke-linecap="round"/>
    <!-- Small sprouting lines -->
    <line x1="0" y1="5" x2="-8" y2="-3" stroke="white" stroke-width="1" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="0" y1="-5" x2="8" y2="-12" stroke="white" stroke-width="1" stroke-opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- ========== DOCUMENT / CLIPBOARD (top right) ========== -->
  <g transform="translate(204,78)" filter="url(#shadowLight)">
    <rect x="-16" y="-20" width="32" height="38" rx="4" fill="#1565c0" fill-opacity="0.85"/>
    <rect x="-12" y="-8" width="24" height="3" rx="1.5" fill="white" fill-opacity="0.6"/>
    <rect x="-12" y="-1" width="18" height="3" rx="1.5" fill="white" fill-opacity="0.4"/>
    <rect x="-12" y="6" width="20" height="3" rx="1.5" fill="white" fill-opacity="0.4"/>
    <!-- Clipboard top -->
    <rect x="-8" y="-24" width="16" height="8" rx="3" fill="#0d3c7a"/>
    <rect x="-4" y="-22" width="8" height="4" rx="2" fill="#00e5ff" fill-opacity="0.7"/>
    <!-- Check mark -->
    <polyline points="-4,13 -1,17 8,8" fill="none" stroke="#66bb6a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ========== MAGNIFIER (top left) ========== -->
  <g transform="translate(76,78)" filter="url(#shadowLight)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <circle cx="0" cy="0" r="9" fill="#ffe066" fill-opacity="0.15"/>
    <!-- Lens shine -->
    <circle cx="-4" cy="-4" r="3" fill="white" fill-opacity="0.2"/>
    <!-- Handle -->
    <line x1="10" y1="10" x2="20" y2="20" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
    <!-- Person silhouette inside lens -->
    <circle cx="0" cy="-3" r="4" fill="#ffe066" fill-opacity="0.7"/>
    <path d="M-5,7 Q-4,2 0,2 Q4,2 5,7 Z" fill="#ffe066" fill-opacity="0.7"/>
  </g>

  <!-- ========== CENTRAL GROUP ========== -->

  <!-- Glowing platform base -->
  <ellipse cx="140" cy="188" rx="58" ry="8" fill="#00e5ff" fill-opacity="0.12" filter="url(#glowStrong)"/>
  <rect x="82" y="182" width="116" height="10" rx="5" fill="url(#ringGrad)" fill-opacity="0.25" filter="url(#glow)"/>

  <!-- === PERSON LEFT (female, teal suit) === -->
  <!-- Head -->
  <circle cx="98" cy="118" r="17" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Hair -->
  <path d="M81,116 Q82,98 98,97 Q114,98 115,116 Q110,104 98,103 Q86,104 81,116 Z" fill="#5d3a1a" fill-opacity="0.85"/>
  <path d="M81,116 Q79,122 83,126" fill="none" stroke="#5d3a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="94" y="133" width="8" height="8" rx="3" fill="url(#skin)"/>
  <!-- Body/suit -->
  <path d="M70,185 Q72,150 98,147 Q124,150 126,185 Z" fill="url(#suitTeal)" filter="url(#shadow)"/>
  <!-- Collar V -->
  <path d="M93,147 L98,160 L103,147" fill="white" fill-opacity="0.2"/>
  <!-- Button line -->
  <line x1="98" y1="160" x2="98" y2="182" stroke="white" stroke-width="1" stroke-opacity="0.25" stroke-dasharray="2 3"/>
  <!-- Shoulder highlight -->
  <ellipse cx="98" cy="147" rx="14" ry="4.5" fill="white" fill-opacity="0.18"/>

  <!-- === PERSON RIGHT (male, blue suit) === -->
  <!-- Head -->
  <circle cx="182" cy="118" r="17" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Hair (short, dark) -->
  <path d="M165,116 Q166,100 182,99 Q198,100 199,116 Q194,106 182,105 Q170,106 165,116 Z" fill="#2c1a0e" fill-opacity="0.8"/>
  <!-- Neck -->
  <rect x="178" y="133" width="8" height="8" rx="3" fill="url(#skin)"/>
  <!-- Body/suit -->
  <path d="M154,185 Q156,150 182,147 Q208,150 210,185 Z" fill="url(#suit)" filter="url(#shadow)"/>
  <!-- Tie -->
  <path d="M179,147 L182,172 L185,147" fill="#e53935" fill-opacity="0.9"/>
  <!-- Collar -->
  <path d="M177,147 L182,157 L187,147" fill="white" fill-opacity="0.25"/>
  <!-- Shoulder highlight -->
  <ellipse cx="182" cy="147" rx="14" ry="4.5" fill="white" fill-opacity="0.18"/>

  <!-- === PERSON CENTER (main figure - bigger, leader) === -->
  <!-- Head -->
  <circle cx="140" cy="105" r="22" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Hair (medium, professional) -->
  <path d="M118,103 Q119,82 140,81 Q161,82 162,103 Q155,89 140,88 Q125,89 118,103 Z" fill="#3e2009" fill-opacity="0.85"/>
  <!-- Ear left -->
  <ellipse cx="118" cy="106" rx="4" ry="6" fill="#e09050"/>
  <!-- Ear right -->
  <ellipse cx="162" cy="106" rx="4" ry="6" fill="#e09050"/>
  <!-- Neck -->
  <rect x="134" y="124" width="12" height="10" rx="4" fill="url(#skin)"/>
  <!-- Body suit (darker, authoritative) -->
  <path d="M102,190 Q104,148 140,145 Q176,148 178,190 Z" fill="#0a2a6e" filter="url(#shadow)"/>
  <!-- Lapels -->
  <path d="M133,145 L140,168 L147,145" fill="white" fill-opacity="0.22"/>
  <!-- Tie accent -->
  <path d="M137,145 L140,170 L143,145" fill="#c62828" fill-opacity="0.85"/>
  <!-- Tie knot -->
  <ellipse cx="140" cy="147" rx="3.5" ry="2.5" fill="#b71c1c" fill-opacity="0.9"/>
  <!-- Shoulder / chest highlight -->
  <ellipse cx="140" cy="145" rx="18" ry="5.5" fill="white" fill-opacity="0.18"/>
  <!-- Badge/ID card on chest -->
  <rect x="129" y="160" width="14" height="18" rx="2" fill="white" fill-opacity="0.22" stroke="white" stroke-width="0.8" stroke-opacity="0.5"/>
  <rect x="131" y="162" width="10" height="5" rx="1" fill="#00e5ff" fill-opacity="0.5"/>
  <rect x="131" y="169" width="8" height="2" rx="1" fill="white" fill-opacity="0.5"/>
  <rect x="131" y="173" width="6" height="2" rx="1" fill="white" fill-opacity="0.35"/>

  <!-- ========== HANDS REACHING / CONNECTING ========== -->
  <!-- Left person arm reaching toward center -->
  <path d="M120,167 Q130,158 140,162" fill="none" stroke="#00838f" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Right person arm reaching toward center -->
  <path d="M160,167 Q150,158 140,162" fill="none" stroke="#1565c0" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Clasped hands glow point -->
  <circle cx="140" cy="162" r="5" fill="#00e5ff" fill-opacity="0.8" filter="url(#glowStrong)"/>

  <!-- ========== FLOATING ICONS / MICRO ELEMENTS ========== -->
  <!-- Star rating top center -->
  <g transform="translate(140,55)" filter="url(#glow)">
    <polygon points="0,-9 2.6,-3 9,-3 4,1.8 5.8,9 0,5 -5.8,9 -4,1.8 -9,-3 -2.6,-3" fill="url(#gold)"/>
  </g>

  <!-- Small dots scattered (pixel sparkle) -->
  <circle cx="110" cy="46" r="2.5" fill="#00e5ff" fill-opacity="0.7" filter="url(#glow)"/>
  <circle cx="170" cy="50" r="2" fill="#ffe066" fill-opacity="0.8" filter="url(#glow)"/>
  <circle cx="58" cy="130" r="2.5" fill="#66bb6a" fill-opacity="0.7" filter="url(#glow)"/>
  <circle cx="222" cy="130" r="2.5" fill="#66bb6a" fill-opacity="0.7" filter="url(#glow)"/>
  <circle cx="72" cy="210" r="2" fill="#ffe066" fill-opacity="0.6" filter="url(#glow)"/>
  <circle cx="210" cy="215" r="2" fill="#ffe066" fill-opacity="0.6" filter="url(#glow)"/>

  <!-- ========== BOTTOM LABEL ========== -->
  <rect x="72" y="200" width="136" height="28" rx="14" fill="#00334d" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.5" filter="url(#shadow)"/>
  <!-- Inner shine -->
  <rect x="74" y="201" width="132" height="10" rx="10" fill="white" fill-opacity="0.07"/>
  <text x="140" y="213" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="8.5" font-weight="800" fill="#00e5ff" letter-spacing="2" fill-opacity="0.95">GESTIÓN DE TALENTO</text>
  <text x="140" y="223" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="7" font-weight="400" fill="white" letter-spacing="1.5" fill-opacity="0.55">RECURSOS HUMANOS</text>

  <!-- ========== OUTER POLISH ========== -->
  <circle cx="140" cy="140" r="136" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.18"/>

</svg>
