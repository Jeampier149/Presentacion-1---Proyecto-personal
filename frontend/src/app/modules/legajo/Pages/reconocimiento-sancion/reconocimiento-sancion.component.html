<app-breadcrumb [rutas]="rutas" [titulo]="'Reconocimiento y Sanciones'"></app-breadcrumb>

<div class="cp-page">

    <!-- ── TOOLBAR ──────────────────────────────────────────────────────────── -->
    <div class="cp-toolbar">
        <div class="cp-toolbar-left">
            @if(accesos?.includes(1)) {
                <button class="cp-btn cp-btn--primary" (click)="nuevoDocumento()">
                    <i class="fa fa-file"></i> Nuevo Documento
                </button>
                <button class="cp-btn cp-btn--ghost" (click)="exportarCarpeta()">
                    <i class="fa-solid fa-download"></i> Exportar
                </button>
            }
        </div>
        <div class="cp-toolbar-right">
            <div class="cp-search-emp">
                <label class="cp-search-label">
                    <i class="fas fa-user"></i> Empleado
                </label>
                <ng-select
                    [items]="emp"
                    bindLabel="nombreC"
                    bindValue="NUMERO_DOCUMENTO"
                    [(ngModel)]="filtroDni"
                    (change)="changeEmp()"
                    placeholder="Buscar por apellidos y nombres..."
                    class="cp-ngselect">
                </ng-select>
            </div>
        </div>
    </div>

    <!-- ── CARD TABLA ────────────────────────────────────────────────────────── -->
    <div class="cp-card">
        <app-loading [mostrar]="loading">

            <div class="cp-filter-bar">
                <div class="cp-filter-bar-left">
                    <i class="fas fa-sliders-h"></i>
                    <span>Filtros activos</span>
                </div>
                <button class="cp-btn cp-btn--danger cp-btn--sm" (click)="limpiarCampos()">
                    <i class="fa-solid fa-trash-can"></i> Limpiar filtros
                </button>
            </div>

            <div class="cp-table-wrap">
                <table class="cp-table">
                    <thead>
                        <tr class="cp-thead-labels">
                            <th *ngFor="let cab of cabeceras"
                                [ngClass]="cab.clase"
                                [style]="cab.estilo">
                                {{ cab.nombre }}
                            </th>
                        </tr>
                        <tr class="cp-thead-filters">
                            <th></th>
                            <th>
                                <input inputmode="text"
                                    class="cp-filter-input cp-filter-input--upper"
                                    name="filtroDocumento" [(ngModel)]="filtroDni"
                                    placeholder="DNI..."
                                    (keydown.enter)="filtrarEmpleado()">
                            </th>
                            <th>
                                <input #inpFocus inputmode="text"
                                    class="cp-filter-input cp-filter-input--upper"
                                    name="filtroTipo" [(ngModel)]="filtroDocumento"
                                    placeholder="Documento..."
                                    (keydown.enter)="filtrarEmpleado()">
                            </th>
                            <th>
                                <input inputmode="text"
                                    class="cp-filter-input cp-filter-input--upper"
                                    name="filtroDocumento2" [(ngModel)]="filtroTipo"
                                    placeholder="Tipo..."
                                    (keydown.enter)="filtrarEmpleado()">
                            </th>
                            <th>
                                <input inputmode="text"
                                    class="cp-filter-input cp-filter-input--upper"
                                    name="filtroAsunto" [(ngModel)]="filtroAsunto"
                                    placeholder="Asunto..."
                                    (keydown.enter)="filtrarEmpleado()">
                            </th>
                            <th>
                                <input type="date"
                                    class="cp-filter-input"
                                    name="filtroFecha" [(ngModel)]="filtroFecha"
                                    (keydown.enter)="filtrarEmpleado()">
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <ng-template [ngIf]="datos.length !== 0" [ngIfElse]="vacio">
                            <tr *ngFor="let dato of datos" class="cp-row">
                                <td>
                                    <div class="cp-row-actions">
                                        @if(accesos?.includes(2)) {
                                            <button class="cp-action-btn cp-action-btn--edit"
                                                [bsTooltip]="'Editar'"
                                                (click)="editarDocumento(dato.id)">
                                                <i class="fa fa-pencil"></i>
                                            </button>
                                        }
                                        <button class="cp-action-btn cp-action-btn--view"
                                            [bsTooltip]="'Ver archivo'"
                                            (click)="descargarArchivo(dato.ruta)">
                                            <i class="fa fa-eye"></i>
                                        </button>
                                    </div>
                                </td>
                                <td class="cp-td-center cp-td-mono">{{ dato.numeroDocumento }}</td>
                                <td class="cp-td-center">{{ dato.documento }}</td>
                                <td class="cp-td-center">
                                    <span class="cp-type-badge">{{ dato.tipo }}</span>
                                </td>
                                <td class="cp-td-asunto">{{ dato.asunto }}</td>
                                <td class="cp-td-center cp-td-date">{{ dato.fecha }}</td>
                            </tr>
                        </ng-template>
                        <ng-template #vacio>
                            <tr>
                                <td [colSpan]="cabeceras.length" class="cp-empty">
                                    <i class="fas fa-inbox"></i>
                                    <p>Sin resultados para los filtros aplicados</p>
                                </td>
                            </tr>
                        </ng-template>
                    </tbody>
                </table>
            </div>

            <div class="cp-pagination">
                <app-paginado
                    [datos]="datos"
                    [(longitud)]="longitud"
                    [pagina]="pagina"
                    (cambioVer)="filtrarEmpleado()"
                    [ver]="true"
                    (cambioPagina)="cambioPagina($event)">
                </app-paginado>
            </div>

        </app-loading>
    </div>

</div>

<app-modal-reconocimiento-sancion></app-modal-reconocimiento-sancion>
<app-modal-ver-compensacion></app-modal-ver-compensacion>
<app-modal-exportar></app-modal-exportar>
